{% extends "base.html" %}
{% block title %}节假日管理 - 民宿房间管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>🎉 节假日管理</h1>
    <button class="btn btn-primary" onclick="showHolidayForm()">+ 新增节假日</button>
</div>

<div class="card">
    <div class="card-body">
        <div id="holidaysList">
            <p class="text-muted text-center">加载中...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', loadHolidays);

async function loadHolidays() {
    const res = await fetch('/api/holidays');
    const json = await res.json();
    if (!json.success) return;
    let html = '';
    json.data.forEach(h => {
        html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-100);">
            <span style="display:flex;align-items:center;gap:12px;">
                <span style="font-size:18px;">🎉</span>
                <strong>${escHtml(h.date)}</strong>
                <span style="color:var(--gray-600);">${escHtml(h.name)}</span>
            </span>
            <button class="btn btn-sm btn-danger" onclick="deleteHoliday(${h.id}, '${escHtml(h.name)}')">删除</button>
        </div>`;
    });
    document.getElementById('holidaysList').innerHTML = html || '<p class="text-muted text-center">暂无节假日</p>';
}

function showHolidayForm() {
    document.getElementById('modalTitle').textContent = '新增节假日';
    document.getElementById('modalBody').innerHTML = `
        <form id="holidayForm">
            <div class="form-row">
                <div class="form-group">
                    <label>日期 <span class="required">*</span></label>
                    <input type="date" id="holidayDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>名称 <span class="required">*</span></label>
                    <input type="text" id="holidayName" class="form-control" required placeholder="如: 端午节">
                </div>
            </div>
        </form>`;
    document.getElementById('modalFooter').innerHTML = `
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveHoliday()">新增</button>`;
    openModal();
}

async function saveHoliday() {
    const date = document.getElementById('holidayDate').value;
    const name = document.getElementById('holidayName').value.trim();
    if (!date || !name) { showToast('请填写日期和名称', 'error'); return; }
    const res = await fetch('/api/holidays', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date, name })
    });
    const json = await res.json();
    if (json.success) { closeModal(); loadHolidays(); showToast('已新增', 'success'); }
    else { showToast(json.error || '失败', 'error'); }
}

async function deleteHoliday(id, name) {
    if (!confirm(`确定删除 "${name}" 吗？`)) return;
    const res = await fetch(`/api/holidays/${id}`, { method: 'DELETE' });
    const json = await res.json();
    if (json.success) { loadHolidays(); showToast('已删除', 'success'); }
    else { showToast(json.error || '失败', 'error'); }
}
</script>
{% endblock %}
