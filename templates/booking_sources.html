{% extends "base.html" %}
{% block title %}预订来源 - 民宿房间管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>🏷️ 预订来源管理</h1>
    <button class="btn btn-primary" onclick="showSourceForm()">+ 新增来源</button>
</div>

<div class="card">
    <div class="card-body">
        <div id="sourcesList">
            <p class="text-muted text-center">加载中...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', loadSources);

async function loadSources() {
    const res = await fetch('/api/booking-sources');
    const json = await res.json();
    if (!json.success) return;
    let html = '';
    json.data.forEach(s => {
        html += `<div class="source-item" style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--gray-100);">
            <span style="display:flex;align-items:center;gap:10px;">
                <span style="width:20px;height:20px;border-radius:50%;background:${s.color};display:inline-block;"></span>
                <strong style="font-size:15px;">${escHtml(s.name)}</strong>
                <code style="font-size:11px;color:var(--gray-400);">${s.color}</code>
            </span>
            <span style="display:flex;gap:6px;">
                <button class="btn btn-sm btn-outline" onclick="editSource(${s.id}, '${escHtml(s.name)}', '${s.color}')">编辑</button>
                <button class="btn btn-sm btn-danger" onclick="deleteSource(${s.id}, '${escHtml(s.name)}')">删除</button>
            </span>
        </div>`;
    });
    document.getElementById('sourcesList').innerHTML = html || '<p class="text-muted text-center">暂无来源</p>';
}

function showSourceForm(data = null) {
    const isEdit = data !== null;
    document.getElementById('modalTitle').textContent = isEdit ? '编辑来源' : '新增来源';
    document.getElementById('modalBody').innerHTML = `
        <form id="sourceForm">
            <input type="hidden" id="sourceId" value="${data ? data.id : ''}">
            <div class="form-row">
                <div class="form-group">
                    <label>名称 <span class="required">*</span></label>
                    <input type="text" id="sourceName" class="form-control" value="${data ? escHtml(data.name) : ''}" required>
                </div>
                <div class="form-group">
                    <label>颜色</label>
                    <input type="color" id="sourceColor" class="form-control" value="${data ? data.color : '#ec4899'}" style="height:40px;width:60px;padding:2px;">
                </div>
            </div>
        </form>`;
    document.getElementById('modalFooter').innerHTML = `
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveSource()">${isEdit ? '保存' : '新增'}</button>`;
    openModal();
}

async function saveSource() {
    const id = document.getElementById('sourceId').value;
    const name = document.getElementById('sourceName').value.trim();
    if (!name) { showToast('请输入名称', 'error'); return; }
    const data = { name, color: document.getElementById('sourceColor').value };
    const url = id ? `/api/booking-sources/${id}` : '/api/booking-sources';
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    const json = await res.json();
    if (json.success) { closeModal(); loadSources(); showToast(id ? '已更新' : '已新增', 'success'); }
    else { showToast(json.error || '失败', 'error'); }
}

function editSource(id, name, color) { showSourceForm({ id, name, color }); }

async function deleteSource(id, name) {
    if (!confirm(`确定删除来源 "${name}" 吗？`)) return;
    const res = await fetch(`/api/booking-sources/${id}`, { method: 'DELETE' });
    const json = await res.json();
    if (json.success) { loadSources(); showToast('已删除', 'success'); }
    else { showToast(json.error || '失败', 'error'); }
}
</script>
{% endblock %}
