{% extends "base.html" %}
{% block title %}日历视图 - 民宿房间管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📅 日历视图</h1>
    <div class="calendar-nav">
        <button class="btn btn-outline" onclick="prevMonth()">◀ 上月</button>
        <h2 id="calendarTitle"></h2>
        <button class="btn btn-outline" onclick="nextMonth()">下月 ▶</button>
        <button class="btn btn-outline" onclick="goToday()">今天</button>
    </div>
</div>

<div class="card">
    <div class="card-body" style="overflow-x:auto;">
        <div id="calendarContainer">
            <p class="text-center text-muted">加载中...</p>
        </div>
    </div>
</div>

<!-- 图例 -->
<div class="card" style="margin-top:16px;">
    <div class="card-header"><h3>图例</h3></div>
    <div class="card-body">
        <div class="legend">
            <span class="legend-item"><span class="legend-color" style="background:#f59e0b;"></span> 待确认</span>
            <span class="legend-item"><span class="legend-color" style="background:#3b82f6;"></span> 已确认</span>
            <span class="legend-item"><span class="legend-color" style="background:#10b981;"></span> 已入住</span>
            <span class="legend-item"><span class="legend-color" style="background:#6b7280;"></span> 已退房</span>
            <span class="legend-item"><span class="legend-color" style="background:#ec4899;width:14px;height:4px;border-radius:2px;display:inline-block;"></span> 每日定价</span>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentYear, currentMonth;
let eventsData = [];
let roomsData = [];
let pricesData = {};

document.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    loadCalendar();
});

async function loadCalendar() {
    document.getElementById('calendarTitle').textContent = `${currentYear}年 ${currentMonth}月`;
    const res = await fetch(`/api/calendar-data?year=${currentYear}&month=${currentMonth}`);
    const json = await res.json();
    if (!json.success) return;

    eventsData = json.data.events;
    roomsData = json.data.rooms;
    pricesData = json.data.prices || {};
    renderCalendar();
}

function renderCalendar() {
    const firstDay = new Date(currentYear, currentMonth - 1, 1);
    const lastDay = new Date(currentYear, currentMonth, 0);
    const startDayOfWeek = firstDay.getDay();
    const daysInMonth = lastDay.getDate();

    const roomEvents = {};
    eventsData.forEach(e => {
        if (!roomEvents[e.room_id]) roomEvents[e.room_id] = [];
        roomEvents[e.room_id].push(e);
    });

    let html = '<table class="calendar-table"><thead><tr><th class="room-col">房间</th>';
    for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(currentYear, currentMonth - 1, d);
        const dayOfWeek = date.getDay();
        const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
        const isToday = date.toDateString() === new Date().toDateString();
        html += `<th class="day-col ${isWeekend ? 'weekend' : ''} ${isToday ? 'today' : ''}">
            <div class="day-num">${d}</div>
            <div class="day-week">${['日','一','二','三','四','五','六'][dayOfWeek]}</div>
        </th>`;
    }
    html += '</tr></thead><tbody>';

    roomsData.forEach(room => {
        html += `<tr><td class="room-col"><strong>${escHtml(room.room_number)}</strong><br><small>${escHtml(room.floor || '')}</small></td>`;

        const events = roomEvents[room.id] || [];
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEvents = events.filter(e => e.start <= dateStr && e.end > dateStr);

            // 查找特殊价格
            const priceKey = `${room.id}_${dateStr}`;
            const specialPrice = pricesData[priceKey];

            let cellClass = '';
            let cellTitle = '';
            if (dayEvents.length > 0) {
                cellClass = 'has-booking';
                cellTitle = dayEvents.map(e => e.title).join(', ');
            }
            if (specialPrice && specialPrice.price > 0) {
                cellClass += ' has-daily-price';
                cellTitle = (cellTitle ? cellTitle + ' | ' : '') + `日价: ¥${specialPrice.price}`;
            }

            html += `<td class="day-cell ${cellClass}" title="${cellTitle}" 
                         onclick="openPriceModal(${room.id}, '${dateStr}', '${escHtml(room.room_number)}', ${specialPrice && specialPrice.price > 0 ? specialPrice.price : 'null'}, ${specialPrice ? specialPrice.id : 'null'}, '${specialPrice ? escHtml(specialPrice.note || '') : ''}')">`;
            dayEvents.forEach(e => {
                const isStart = e.start === dateStr;
                html += `<div class="booking-bar" style="background:${e.color};" title="${escHtml(e.title)}">
                    ${isStart ? escHtml(e.title.substring(0,2)) : ''}
                </div>`;
            });
            if (specialPrice && specialPrice.price > 0) {
                html += `<div class="price-dot" title="¥${specialPrice.price}">¥${specialPrice.price}</div>`;
            }
            html += '</td>';
        }
        html += '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('calendarContainer').innerHTML = html;
}

// ==================== 每日价格弹窗 ====================

function openPriceModal(roomId, dateStr, roomNumber, currentPrice, priceId, note) {
    const hasPrice = currentPrice !== null && currentPrice > 0;
    document.getElementById('modalTitle').textContent = 
        `💰 每日价格 - ${escHtml(roomNumber)} (${dateStr})`;

    document.getElementById('modalBody').innerHTML = `
        <form id="priceForm">
            <input type="hidden" id="priceRoomId" value="${roomId}">
            <input type="hidden" id="priceDate" value="${dateStr}">
            <input type="hidden" id="priceId" value="${priceId || ''}">
            <div class="form-row">
                <div class="form-group">
                    <label>价格 (元/晚) <span class="required">*</span></label>
                    <input type="number" id="priceValue" class="form-control" step="0.01" 
                           value="${currentPrice || ''}" placeholder="0 表示清除价格" autofocus>
                </div>
            </div>
            <div class="form-group">
                <label>备注</label>
                <input type="text" id="priceNote" class="form-control" 
                       value="${note || ''}" placeholder="如: 含早、折扣价等">
            </div>
        </form>`;
    document.getElementById('modalFooter').innerHTML = `
        ${hasPrice ? `<button class="btn btn-danger" onclick="deletePrice(${priceId})">清除价格</button>` : ''}
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="savePrice()">保存</button>`;
    openModal();
}

async function savePrice() {
    const roomId = parseInt(document.getElementById('priceRoomId').value);
    const date = document.getElementById('priceDate').value;
    const price = parseFloat(document.getElementById('priceValue').value) || 0;
    const note = document.getElementById('priceNote').value.trim();

    try {
        const res = await fetch('/api/daily-prices', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ room_id: roomId, date, price, note })
        });
        const json = await res.json();
        if (json.success) {
            closeModal();
            showToast(price > 0 ? '价格已更新' : '价格已清除', 'success');
            loadCalendar();
        } else {
            showToast(json.error || '操作失败', 'error');
        }
    } catch (e) {
        showToast('操作失败: ' + e.message, 'error');
    }
}

async function deletePrice(priceId) {
    if (!confirm('确定要清除此日期的价格吗？')) return;
    try {
        const res = await fetch(`/api/daily-prices/${priceId}`, { method: 'DELETE' });
        const json = await res.json();
        if (json.success) {
            closeModal();
            showToast('价格已清除', 'success');
            loadCalendar();
        } else {
            showToast(json.error || '删除失败', 'error');
        }
    } catch (e) {
        showToast('删除失败: ' + e.message, 'error');
    }
}

function prevMonth() {
    if (currentMonth === 1) { currentMonth = 12; currentYear--; }
    else { currentMonth--; }
    loadCalendar();
}

function nextMonth() {
    if (currentMonth === 12) { currentMonth = 1; currentYear++; }
    else { currentMonth++; }
    loadCalendar();
}

function goToday() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    loadCalendar();
}
</script>
{% endblock %}
