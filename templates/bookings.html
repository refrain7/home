{% extends "base.html" %}
{% block title %}预订管理 - 民宿房间管理系统{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📋 预订管理</h1>
    <button class="btn btn-primary" onclick="showBookingForm()">+ 新增预订</button>
</div>

<div class="card">
    <div class="card-header">
        <div class="filter-bar">
            <input type="text" id="searchKeyword" placeholder="🔍 搜索客人、手机号、房间号、预订ID..." oninput="loadBookings()" />
            <select id="filterStatus" onchange="loadBookings()">
                <option value="">全部状态</option>
                <option value="pending">待确认</option>
                <option value="confirmed">已确认</option>
                <option value="checked_in">已入住</option>
                <option value="checked_out">已退房</option>
                <option value="cancelled">已取消</option>
                <option value="no_show">未到店</option>
            </select>
            <input type="date" id="filterDateFrom" onchange="loadBookings()" title="入住开始日期" />
            <input type="date" id="filterDateTo" onchange="loadBookings()" title="入住结束日期" />
        </div>
    </div>
    <div class="card-body">
        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>客人</th>
                        <th>房间号</th>
                        <th>入住日期</th>
                        <th>退房日期</th>
                        <th>人数</th>
                        <th>金额</th>
                        <th>押金</th>
                        <th>状态</th>
                        <th>来源</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="bookingTableBody">
                    <tr><td colspan="12" class="text-center text-muted">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="bookingPagination"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentPage = 1;
let guestsList = [];
let roomsList = [];
let sourcesList = [];

function autoCalcTotal() {
    const dailyPrice = parseFloat(document.getElementById('bookingDailyPrice').value) || 0;
    const checkIn = document.getElementById('bookingCheckIn').value;
    const checkOut = document.getElementById('bookingCheckOut').value;
    if (dailyPrice > 0 && checkIn && checkOut) {
        const days = Math.max(1, (new Date(checkOut) - new Date(checkIn)) / 86400000);
        document.getElementById('bookingTotalPrice').value = (dailyPrice * days).toFixed(2);
    }
}

function autoCalcDaily() {
    const totalPrice = parseFloat(document.getElementById('bookingTotalPrice').value) || 0;
    const checkIn = document.getElementById('bookingCheckIn').value;
    const checkOut = document.getElementById('bookingCheckOut').value;
    if (totalPrice > 0 && checkIn && checkOut) {
        const days = Math.max(1, (new Date(checkOut) - new Date(checkIn)) / 86400000);
        document.getElementById('bookingDailyPrice').value = (totalPrice / days).toFixed(2);
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    // 预加载客人和房间列表
    const [gRes, rRes] = await Promise.all([
        fetch('/api/guests?page=1&keyword='),
        fetch('/api/rooms?page=1&keyword=')
    ]);
    const gJson = await gRes.json();
    const rJson = await rRes.json();
    if (gJson.success) guestsList = gJson.data.items;
    if (rJson.success) roomsList = rJson.data.items;
    loadBookings();
});

async function loadBookings() {
    const keyword = document.getElementById('searchKeyword').value;
    const status = document.getElementById('filterStatus').value;
    const dateFrom = document.getElementById('filterDateFrom').value;
    const dateTo = document.getElementById('filterDateTo').value;
    const res = await fetch(`/api/bookings?keyword=${encodeURIComponent(keyword)}&status=${status}&date_from=${dateFrom}&date_to=${dateTo}&page=${currentPage}`);
    const json = await res.json();
    if (!json.success) return;

    const data = json.data;
    if (json.sources) sourcesList = json.sources;
    const statusClass = {pending:'badge-warning', confirmed:'badge-info', checked_in:'badge-success', checked_out:'badge-secondary', cancelled:'badge-danger', no_show:'badge-dark'};
    let html = '';
    if (data.items.length === 0) {
        html = '<tr><td colspan="12" class="text-center text-muted">暂无预订数据</td></tr>';
    } else {
        data.items.forEach(b => {
            html += `
                <tr>
                    <td>${b.id}</td>
                    <td><strong>${escHtml(b.guest_name)}</strong><br><small class="text-muted">${escHtml(b.guest_phone)}</small></td>
                    <td><span class="badge badge-outline">${escHtml(b.room_number)}</span></td>
                    <td>${b.check_in_date}</td>
                    <td>${b.check_out_date}</td>
                    <td>${b.guest_count}人</td>
                    <td><strong>¥${b.total_price.toFixed(2)}</strong></td>
                    <td>¥${b.deposit.toFixed(2)}</td>
                    <td><span class="badge ${statusClass[b.status] || ''}">${b.status}</span></td>
                    <td><span class="badge" style="background:${b.source_color || '#6b7280'};color:#fff;">${escHtml(b.source || '-')}</span></td>
                    <td><small>${b.created_at}</small></td>
                    <td class="action-cell">
                        <button class="btn btn-sm btn-outline" onclick="editBooking(${b.id})">编辑</button>
                        <button class="btn btn-sm btn-outline" onclick="changeStatus(${b.id}, '${b.status}')">状态</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteBooking(${b.id})">删除</button>
                    </td>
                </tr>`;
        });
    }
    document.getElementById('bookingTableBody').innerHTML = html;
    renderPagination('bookingPagination', data, loadBookings);
}

function showBookingForm(data = null) {
    const isEdit = data !== null;
    document.getElementById('modalTitle').textContent = isEdit ? '编辑预订' : '新增预订';

    let guestOptions = '<option value="">请选择客人</option>';
    guestsList.forEach(g => {
        guestOptions += `<option value="${g.id}" ${data && data.guest_id === g.id ? 'selected' : ''}>${escHtml(g.name)} (${escHtml(g.phone || '')})</option>`;
    });
    let roomOptions = '<option value="">请选择房间</option>';
    roomsList.forEach(r => {
        const typeName = r.room_type_name || '';
        roomOptions += `<option value="${r.id}" ${data && data.room_id === r.id ? 'selected' : ''}>${escHtml(r.room_number)} (${escHtml(typeName)})</option>`;
    });

    const statusOptions = [
        ['pending', '待确认'], ['confirmed', '已确认'], ['checked_in', '已入住'],
        ['checked_out', '已退房'], ['cancelled', '已取消'], ['no_show', '未到店']
    ].map(([k,v]) => `<option value="${k}" ${data && data.status === k ? 'selected' : ''}>${v}</option>`).join('');

    document.getElementById('modalBody').innerHTML = `
        <form id="bookingForm">
            <input type="hidden" id="bookingId" value="${data ? data.id : ''}">
            <div class="form-row">
                <div class="form-group" style="flex:2;">
                    <label>客人 <span class="required">*</span></label>
                    <div style="display:flex;gap:6px;">
                        <select id="bookingGuestId" class="form-control">${guestOptions}</select>
                        <button type="button" class="btn btn-outline btn-sm" onclick="showQuickGuestForm()" style="white-space:nowrap;flex-shrink:0;" title="快速新增客人">＋ 新增</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>房间 <span class="required">*</span></label>
                    <select id="bookingRoomId" class="form-control">${roomOptions}</select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>入住日期 <span class="required">*</span></label>
                    <input type="date" id="bookingCheckIn" class="form-control" value="${data ? data.check_in_date : ''}" required>
                </div>
                <div class="form-group">
                    <label>退房日期 <span class="required">*</span></label>
                    <input type="date" id="bookingCheckOut" class="form-control" value="${data ? data.check_out_date : ''}" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>入住人数</label>
                    <input type="number" id="bookingGuestCount" class="form-control" value="${data ? data.guest_count : 1}" min="1">
                </div>
                <div class="form-group">
                    <label>每日价格 (元)</label>
                    <input type="number" id="bookingDailyPrice" class="form-control" step="0.01" value="${data ? (data.total_price && data.check_in_date && data.check_out_date ? (data.total_price / Math.max(1, (new Date(data.check_out_date) - new Date(data.check_in_date)) / 86400000)).toFixed(2) : '') : ''}" placeholder="自动计算总价" oninput="autoCalcTotal()">
                </div>
                <div class="form-group">
                    <label>总金额 <span class="required">*</span></label>
                    <input type="number" id="bookingTotalPrice" class="form-control" step="0.01" value="${data ? data.total_price : 0}" required oninput="autoCalcDaily()">
                </div>
                <div class="form-group">
                    <label>押金</label>
                    <input type="number" id="bookingDeposit" class="form-control" step="0.01" value="${data ? data.deposit : 0}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>状态</label>
                    <select id="bookingStatus" class="form-control">${statusOptions}</select>
                </div>
                <div class="form-group">
                    <label>预订来源</label>
                    <select id="bookingSource" class="form-control">
                        ${sourcesList.map(s => `<option value="${escHtml(s.name)}" ${data && data.source === s.name ? 'selected' : (!data && s.name === '直接预订' ? 'selected' : '')}>${escHtml(s.name)}</option>`).join('')}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="bookingNotes" class="form-control" rows="2">${data ? escHtml(data.notes || '') : ''}</textarea>
            </div>
        </form>`;
    document.getElementById('modalFooter').innerHTML = `
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveBooking()">${isEdit ? '保存' : '确认新增'}</button>`;
    openModal();
}

async function saveBooking() {
    const id = document.getElementById('bookingId').value;
    const guestId = parseInt(document.getElementById('bookingGuestId').value);
    const roomId = parseInt(document.getElementById('bookingRoomId').value);
    if (!guestId || !roomId) { showToast('请选择客人和房间', 'error'); return; }

    const checkIn = document.getElementById('bookingCheckIn').value;
    const checkOut = document.getElementById('bookingCheckOut').value;
    if (!checkIn || !checkOut) { showToast('请选择入住和退房日期', 'error'); return; }
    if (checkOut <= checkIn) { showToast('退房日期必须晚于入住日期', 'error'); return; }

    const data = {
        guest_id: guestId, room_id: roomId,
        check_in_date: checkIn, check_out_date: checkOut,
        guest_count: parseInt(document.getElementById('bookingGuestCount').value) || 1,
        total_price: parseFloat(document.getElementById('bookingTotalPrice').value) || 0,
        deposit: parseFloat(document.getElementById('bookingDeposit').value) || 0,
        status: document.getElementById('bookingStatus').value,
        source: document.getElementById('bookingSource').value.trim(),
        notes: document.getElementById('bookingNotes').value.trim(),
    };

    const url = id ? `/api/bookings/${id}` : '/api/bookings';
    const method = id ? 'PUT' : 'POST';
    
    // 编辑时：询问是否覆盖每日价格
    if (id) {
        _pendingBookingSave = { url, method, data };
        document.getElementById('modalTitle').textContent = '更新预订';
        document.getElementById('modalBody').innerHTML = `
            <p>是否<strong>覆盖</strong>该日期范围内的每日价格为预订均价？</p>
            <p class="text-muted text-sm">选择「覆盖」将把日期范围内已有的手动定价也一并替换。<br>选择「仅更新预订」则只更新预订，保留已有的手动定价。</p>`;
        document.getElementById('modalFooter').innerHTML = `
            <button class="btn btn-outline" onclick="confirmSaveBooking(false)">仅更新预订</button>
            <button class="btn btn-primary" onclick="confirmSaveBooking(true)">覆盖每日价格</button>`;
        return;
    }
    
    // 新增预订：直接保存
    const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    const json = await res.json();
    if (json.success) { closeModal(); loadBookings(); showToast('预订已新增', 'success'); }
    else { showToast(json.error || '操作失败', 'error'); }
}

let _pendingBookingSave = null;

async function confirmSaveBooking(forceOverwrite) {
    const { url, method, data } = _pendingBookingSave;
    _pendingBookingSave = null;
    
    const finalUrl = forceOverwrite ? url + '?force_overwrite=1' : url;
    const res = await fetch(finalUrl, { method, headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) });
    const json = await res.json();
    if (json.success) { closeModal(); loadBookings(); showToast('预订已更新', 'success'); }
    else { showToast(json.error || '操作失败', 'error'); }
}

async function editBooking(id) {
    const res = await fetch(`/api/bookings/${id}`);
    const json = await res.json();
    if (json.success) showBookingForm(json.data);
}

// ==================== 快速新增客人（在预订弹窗内） ====================

let _pendingBookingData = null;  // 暂存预订表单数据

function showQuickGuestForm() {
    // 1. 保存当前预订表单数据
    _pendingBookingData = captureBookingFormData();

    // 2. 切换模态框内容为快速新增客人表单
    document.getElementById('modalTitle').textContent = '快速新增客人';
    document.getElementById('modalBody').innerHTML = `
        <form id="quickGuestForm">
            <div class="form-row">
                <div class="form-group">
                    <label>姓名 <span class="required">*</span></label>
                    <input type="text" id="quickGuestName" class="form-control" required placeholder="请输入客人姓名">
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="quickGuestGender" class="form-control">
                        <option value="">未知</option>
                        <option value="male">男</option>
                        <option value="female">女</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>手机号 <span class="required">*</span></label>
                    <input type="text" id="quickGuestPhone" class="form-control" required placeholder="请输入手机号">
                </div>
                <div class="form-group">
                    <label>身份证号</label>
                    <input type="text" id="quickGuestIdCard" class="form-control" placeholder="选填">
                </div>
            </div>
            <div class="form-group">
                <label>备注</label>
                <input type="text" id="quickGuestNotes" class="form-control" placeholder="选填">
            </div>
        </form>`;
    document.getElementById('modalFooter').innerHTML = `
        <button class="btn btn-outline" onclick="cancelQuickGuest()">← 返回预订</button>
        <button class="btn btn-primary" onclick="saveQuickGuest()">确认新增</button>`;
}

function captureBookingFormData() {
    const el = (id) => { const e = document.getElementById(id); return e ? e.value : ''; };
    return {
        id: el('bookingId'),
        guest_id: el('bookingGuestId'),
        room_id: el('bookingRoomId'),
        check_in_date: el('bookingCheckIn'),
        check_out_date: el('bookingCheckOut'),
        guest_count: el('bookingGuestCount') || '1',
        total_price: el('bookingTotalPrice') || '0',
        deposit: el('bookingDeposit') || '0',
        status: el('bookingStatus') || 'pending',
        source: el('bookingSource'),
        notes: el('bookingNotes'),
    };
}

async function saveQuickGuest() {
    const name = document.getElementById('quickGuestName').value.trim();
    const phone = document.getElementById('quickGuestPhone').value.trim();
    if (!name) { showToast('请输入客人姓名', 'error'); return; }
    if (!phone) { showToast('请输入手机号', 'error'); return; }

    const data = {
        name, phone,
        id_card: document.getElementById('quickGuestIdCard').value.trim(),
        gender: document.getElementById('quickGuestGender').value,
        nationality: '', birthday: '', email: '', address: '',
        notes: document.getElementById('quickGuestNotes').value.trim(),
    };

    try {
        const res = await fetch('/api/guests', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const json = await res.json();
        if (json.success) {
            await refreshGuestList();
            showToast('客人已新增', 'success');
            restoreBookingForm(json.data.id);
        } else {
            showToast(json.error || '新增失败', 'error');
        }
    } catch (e) {
        showToast('新增失败: ' + e.message, 'error');
    }
}

function cancelQuickGuest() {
    restoreBookingForm(null);
}

function restoreBookingForm(preselectedGuestId) {
    const bd = _pendingBookingData || {};
    // 重新渲染预订表单
    showBookingForm(bd.id ? bd : null);
    // 恢复表单字段值
    setTimeout(() => {
        const setVal = (id, val) => { const e = document.getElementById(id); if (e && val) e.value = val; };
        // 如果新增了客人，预选新客人
        if (preselectedGuestId) {
            setVal('bookingGuestId', preselectedGuestId);
        } else if (bd.guest_id) {
            setVal('bookingGuestId', bd.guest_id);
        }
        setVal('bookingRoomId', bd.room_id);
        setVal('bookingCheckIn', bd.check_in_date);
        setVal('bookingCheckOut', bd.check_out_date);
        setVal('bookingGuestCount', bd.guest_count);
        setVal('bookingTotalPrice', bd.total_price);
        setVal('bookingDeposit', bd.deposit);
        setVal('bookingStatus', bd.status);
        setVal('bookingSource', bd.source);
        setVal('bookingNotes', bd.notes);
        _pendingBookingData = null;
    }, 100);
}

async function refreshGuestList() {
    try {
        const res = await fetch('/api/guests?page=1&keyword=');
        const json = await res.json();
        if (json.success) { guestsList = json.data.items; }
    } catch (e) { console.error('刷新客人列表失败:', e); }
}

async function changeStatus(id, currentStatus) {
    const statusMap = {pending:'待确认', confirmed:'已确认', checked_in:'已入住', checked_out:'已退房', cancelled:'已取消', no_show:'未到店'};
    let options = '';
    for (const [k, v] of Object.entries(statusMap)) {
        if (k !== currentStatus) {
            options += `<option value="${k}">${v}</option>`;
        }
    }
    document.getElementById('modalTitle').textContent = '更改预订状态';
    document.getElementById('modalBody').innerHTML = `
        <p>当前状态: <strong>${statusMap[currentStatus] || currentStatus}</strong></p>
        <div class="form-group">
            <label>选择新状态</label>
            <select id="newStatusSelect" class="form-control">${options}</select>
        </div>`;
    document.getElementById('modalFooter').innerHTML = `
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="confirmChangeStatus(${id})">确认更改</button>`;
    openModal();
}

async function confirmChangeStatus(id) {
    const newStatus = document.getElementById('newStatusSelect').value;
    // 获取当前预订数据
    const getRes = await fetch(`/api/bookings/${id}`);
    const bookingData = await getRes.json();
    if (!bookingData.success) { showToast('获取预订信息失败', 'error'); return; }
    const b = bookingData.data;
    const updateRes = await fetch(`/api/bookings/${id}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
            room_id: b.room_id, guest_id: b.guest_id,
            check_in_date: b.check_in_date, check_out_date: b.check_out_date,
            guest_count: b.guest_count, total_price: b.total_price,
            deposit: b.deposit, status: newStatus,
            source: b.source || '', notes: b.notes || ''
        })
    });
    const updateJson = await updateRes.json();
    if (updateJson.success) { closeModal(); loadBookings(); showToast('状态已更新', 'success'); }
    else { showToast(updateJson.error || '更新失败', 'error'); }
}

async function deleteBooking(id) {
    _pendingDeleteId = id;
    document.getElementById('modalTitle').textContent = '删除预订';
    document.getElementById('modalBody').innerHTML = `
        <p>确定要<strong>删除</strong>此预订吗？</p>
        <p class="text-muted text-sm">是否同时清除该日期范围内的每日价格？<br>清除后日历上将不再显示这些日期的定价。</p>`;
    document.getElementById('modalFooter').innerHTML = `
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-outline" onclick="confirmDeleteBooking(false)">仅删预订</button>
        <button class="btn btn-danger" onclick="confirmDeleteBooking(true)">同时清除价格</button>`;
    openModal();
}

let _pendingDeleteId = null;

async function confirmDeleteBooking(deletePrices) {
    const id = _pendingDeleteId;
    _pendingDeleteId = null;
    const url = deletePrices ? `/api/bookings/${id}?delete_prices=1` : `/api/bookings/${id}`;
    const res = await fetch(url, { method: 'DELETE' });
    const json = await res.json();
    if (json.success) { closeModal(); loadBookings(); showToast('预订已删除', 'success'); }
    else { showToast(json.error || '删除失败', 'error'); }
}
</script>
{% endblock %}
